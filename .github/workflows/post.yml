name: Threads Auto Post & Keepalive

on:
  schedule:
    # 1. Threads自動投稿（日本時間 08:00 〜 00:00 の2時間おき）
    - cron: '0 23,1,3,5,7,9,11,13,15 * * *'
    # 2. 自動メンテナンス（毎月1日の 00:00 に実行してワークフロー停止を防ぐ）
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  auto-post:
    runs-on: ubuntu-latest
    
    # 書き込み権限を追加（メンテナンス時のダミー更新に必要）
    permissions:
      contents: write
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run main.py (Only on Threads post schedule)
        # 毎月1日0時の実行時はPythonを動かさないよう、条件分岐を入れています
        if: github.event.schedule != '0 0 1 * *'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: python main.py

      - name: Dummy commit to keep workflow active (Only on monthly schedule)
        # 毎月1日0時だけ、自分自身を更新して「生存報告」をする設定
        if: github.event.schedule == '0 0 1 * *'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          echo "Last Keepalive: $(date)" > keepalive.txt
          git add keepalive.txt
          git commit -m "Keepalive: $(date)" || exit 0
          git push