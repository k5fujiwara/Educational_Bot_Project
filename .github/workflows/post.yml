name: Threads Auto Post (2h Interval)

on:
  schedule:
    # 2時間おきに実行（日本時間 08:00, 10:00, 12:00, 14:00, 16:00, 18:00, 20:00, 22:00, 00:00）
    # UTC（世界標準時）換算: 23:00(前日), 01:00, 03:00, 05:00, 07:00, 09:00, 11:00, 13:00, 15:00
    - cron: '0 23,1,3,5,7,9,11,13,15 * * *'
  
  # GitHubの画面から手動で実行するためのボタンを表示させる設定
  workflow_dispatch:

jobs:
  auto-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run main.py
        env:
          # GitHubのリポジトリ設定（Secrets）に登録した値を環境変数に読み込む
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: python main.py